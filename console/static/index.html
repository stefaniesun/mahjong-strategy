<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>S5 本地训练控制台</title><style>
:root{color-scheme:dark;--bg:#07111f;--panel:#101d30;--line:#243a56;--text:#e7f0ff;--muted:#8fa5c2;--good:#42d392;--warn:#ffbd59;--bad:#ff6b6b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#132945,var(--bg) 45%);color:var(--text);font:14px system-ui}main{max-width:1280px;margin:auto;padding:24px}.head{display:flex;justify-content:space-between;align-items:center}h1{font-size:24px}button,input,select{background:#182b43;color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px}button{cursor:pointer}.primary{background:#246bfd}.danger{background:#9d3340}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 4;background:linear-gradient(150deg,#12233a,#0c1728);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 12px 30px #0005}.wide{grid-column:span 8}.full{grid-column:1/-1}.metric{font-size:28px;font-weight:700}.muted{color:var(--muted)}.controls{display:flex;gap:8px;flex-wrap:wrap}.chart{width:100%;height:230px}.log{max-height:240px;overflow:auto;white-space:pre-wrap}.ok{color:var(--good)}.bad{color:var(--bad)}@media(max-width:760px){main{padding:12px}.card,.wide{grid-column:1/-1}.head{align-items:flex-start;flex-direction:column}}
</style></head><body><main><div class="head"><div><h1>S5 本地训练控制台</h1><p class="muted">可信局域网 · Agent A / Server B</p></div><div id="clock"></div></div><section class="grid"><article class="card full"><h2>训练控制</h2><div class="controls"><label>Updates <input id="updates" type="number" min="1" value="100"></label><label>Device <select id="device"><option>auto</option><option>cuda</option><option>cpu</option></select></label><button class="primary" onclick="start()">开始 / 恢复</button><button class="danger" onclick="pause()">优雅暂停</button><button onclick="load()">刷新</button></div></article><article class="card"><h2>训练机 A</h2><div id="state" class="metric">--</div><p id="healthA" class="muted">等待数据</p></article><article class="card"><h2>全局进度</h2><div id="step" class="metric">--</div><p id="throughput" class="muted">-- 局/分钟</p></article><article class="card"><h2>评估机 B</h2><div id="evalState" class="metric">--</div><p id="healthB" class="muted">等待数据</p></article><article class="card wide"><h2>训练曲线</h2><div class="controls"><button onclick="range='day';load()">最近24小时</button><button onclick="range='all';load()">全程</button></div><svg id="chart" class="chart" viewBox="0 0 800 230"></svg></article><article class="card"><h2>最新强度</h2><div id="strength" class="metric">--</div><p class="muted">对 S3 胜率</p></article><article class="card full"><h2>强度曲线（场均分）</h2><svg id="strengthChart" class="chart" viewBox="0 0 800 230"></svg></article><article class="card full"><h2>事件日志</h2><div id="events" class="log muted">暂无事件</div></article></section></main><script>
const $=id=>document.getElementById(id);let range='day';async function api(url,opt){const r=await fetch(url,opt);if(!r.ok)throw Error(await r.text());return r.json()}async function start(){await api('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({overrides:{updates:+$('updates').value,device:$('device').value},resume:true})});load()}async function pause(){await api('/api/pause',{method:'POST'});load()}function line(id,vals,color='#42d392',baseline=null){const w=800,h=210;if(!vals.length){$(id).innerHTML='';return}const all=baseline===null?vals:[...vals,baseline,0],lo=Math.min(...all),hi=Math.max(...all),span=hi-lo||1,y=v=>h-(v-lo)*h/span,pts=vals.map((v,i)=>`${i*w/Math.max(vals.length-1,1)},${y(v)}`).join(' ');$(id).innerHTML=`<line x1="0" y1="${y(0)}" x2="800" y2="${y(0)}" stroke="#607893"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="3"/>`+(baseline===null?'':`<line x1="0" y1="${y(baseline)}" x2="800" y2="${y(baseline)}" stroke="#ffbd59" stroke-dasharray="8 6"/>`)}function draw(rows){line('chart',rows.map(x=>+x.value_loss||0))}async function load(){try{const [s,all,e,v]=await Promise.all([api('/api/status'),api('/api/history'),api('/api/events'),api('/api/evaluations')]),cut=Date.now()-86400000,h=range==='day'?all.filter(x=>Date.parse(x.timestamp)>=cut):all,a=s.agent||{},m=(h||[]).at(-1)||{},ta=(a.telemetry||[]).at(-1)||{},tb=(s.server_telemetry||[]).at(-1)||{};$('state').textContent=a.status||'OFFLINE';$('state').className='metric '+(a.status==='RUNNING'?'ok':a.status==='OFFLINE'?'bad':'');$('healthA').textContent=`CPU ${ta.cpu_temp_c??'?'}°C · GPU ${ta.gpu_temp_c??'?'}°C · 磁盘 ${(ta.disk_free_gib??0).toFixed?.(1)??'?'} GiB`;$('healthB').textContent=`CPU ${tb.cpu_temp_c??'?'}°C · 磁盘 ${(tb.disk_free_gib??0).toFixed?.(1)??'?'} GiB`;$('step').textContent=m.global_step??'--';$('throughput').textContent=(m.episodes_per_minute?.toFixed?.(1)??'--')+' 局/分钟';$('evalState').textContent=s.evaluator_paused?'过热暂停':'就绪';$('strength').textContent=v.length?((v.at(-1).win_rate_vs_s3*100).toFixed(1)+'%'):'--';$('events').textContent=e.map(x=>`[${x.timestamp}] ${x.level}: ${x.message}`).join('\n')||'暂无事件';draw(h);line('strengthChart',v.map(x=>+x.average_score_difference||0),'#4aa8ff',-0.044)}catch(err){$('state').textContent='连接失败';$('state').className='metric bad'}}setInterval(()=>{$('clock').textContent=new Date().toLocaleString()},1000);load();setInterval(load,10000);
</script></body></html>
